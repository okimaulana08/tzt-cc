name: 🚀 Deploy Laravel to Hostinger

on:
  push:
    branches:
      - main

jobs:
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, bcmath, pdo, pdo_sqlite, xml, curl, zip
          coverage: none

      - name: 📦 Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: 🔧 Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: 📄 Create .env from secret
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: 🔑 Generate app key
        run: php artisan key:generate

      - name: 🏗️ Install Node & build assets
        run: npm ci && npm run build

      - name: 🗄️ Create SQLite database file
        run: touch database/database.sqlite

      - name: 🗄️ Run migrations
        run: php artisan migrate --force

      - name: ✅ Run tests
        run: php artisan test

  deploy:
    name: 🚀 Deploy to Hostinger
    runs-on: ubuntu-latest
    needs: test
    environment: prod
    env:
      HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
      HOSTINGER_USERNAME: ${{ secrets.HOSTINGER_USERNAME }}
      HOSTINGER_SSH_PRIVATE_KEY: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
      HOSTINGER_DEPLOY_PATH: ${{ secrets.HOSTINGER_DEPLOY_PATH }}

    steps:
      - name: 🔍 Check required secrets
        run: |
          missing=""
          [ -z "$HOSTINGER_HOST" ] && missing="$missing HOSTINGER_HOST"
          [ -z "$HOSTINGER_USERNAME" ] && missing="$missing HOSTINGER_USERNAME"
          [ -z "$HOSTINGER_SSH_PRIVATE_KEY" ] && missing="$missing HOSTINGER_SSH_PRIVATE_KEY"
          [ -z "$HOSTINGER_DEPLOY_PATH" ] && missing="$missing HOSTINGER_DEPLOY_PATH"
          if [ -n "$missing" ]; then
            echo "⚠️ Skipping deploy — secrets not configured:$missing"
            exit 0
          fi
          echo "secrets_ok=true" >> $GITHUB_ENV

      - name: 📥 Checkout code
        if: env.secrets_ok == 'true'
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP
        if: env.secrets_ok == 'true'
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, bcmath, pdo, pdo_mysql, xml, curl, zip
          coverage: none

      - name: 📦 Cache Composer dependencies
        if: env.secrets_ok == 'true'
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: 🔧 Install Composer dependencies (production)
        if: env.secrets_ok == 'true'
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev

      - name: 🏗️ Build frontend assets
        if: env.secrets_ok == 'true'
        run: npm ci && npm run build

      - name: 🔐 Setup SSH Agent
        if: env.secrets_ok == 'true'
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}

      - name: 📤 Deploy project root via Rsync
        if: env.secrets_ok == 'true'
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='public/' \
            --exclude='public_html' \
            --exclude='storage/logs' \
            --exclude='storage/framework/cache' \
            --exclude='storage/framework/sessions' \
            --exclude='storage/framework/views' \
            -e "ssh -p 65002 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
            ./ "${{ secrets.HOSTINGER_USERNAME }}@${{ secrets.HOSTINGER_HOST }}:${{ secrets.HOSTINGER_DEPLOY_PATH }}/"

      - name: 📤 Deploy public/ to public_html
        if: env.secrets_ok == 'true'
        run: |
          rsync -avz --delete \
            -e "ssh -p 65002 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
            ./public/ "${{ secrets.HOSTINGER_USERNAME }}@${{ secrets.HOSTINGER_HOST }}:${{ secrets.HOSTINGER_DEPLOY_PATH }}/public_html/"

      - name: 📄 Deploy .env to server
        if: env.secrets_ok == 'true'
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: |
          if [ -z "$ENV_FILE" ]; then
            echo "⚠️ ENV_FILE secret not set — skipping .env deploy"
            exit 0
          fi
          printf '%s\n' "$ENV_FILE" > /tmp/.env.prod
          rsync -avz /tmp/.env.prod \
            -e "ssh -p 65002 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
            "${{ secrets.HOSTINGER_USERNAME }}@${{ secrets.HOSTINGER_HOST }}:${{ secrets.HOSTINGER_DEPLOY_PATH }}/.env"
          rm -f /tmp/.env.prod

      - name: ⚙️ Run post-deploy commands
        if: env.secrets_ok == 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          port: 65002
          username: ${{ secrets.HOSTINGER_USERNAME }}
          key: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
          script: |
            cd ${{ secrets.HOSTINGER_DEPLOY_PATH }}
            mkdir -p storage/framework/{cache,sessions,views,testing}
            mkdir -p storage/logs
            mkdir -p bootstrap/cache
            grep -q "^APP_KEY=base64:" .env 2>/dev/null || php artisan key:generate --force
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache
            chmod -R 775 storage bootstrap/cache
            chown -R www-data:www-data storage bootstrap/cache 2>/dev/null || true
            echo '✅ Deploy selesai!'
