name: 🚀 Deploy Laravel to Hostinger

on:
  push:
    branches:
      - main

jobs:
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, bcmath, pdo, pdo_sqlite, xml, curl, zip
          coverage: none

      - name: 📦 Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: 🔧 Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: 📄 Create .env from secret
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: 🔑 Generate app key
        run: php artisan key:generate

      - name: 🏗️ Install Node & build assets
        run: npm ci && npm run build

      - name: 🗄️ Create SQLite database file
        run: touch database/database.sqlite

      - name: 🗄️ Run migrations
        run: php artisan migrate --force

      - name: ✅ Run tests
        run: php artisan test

  deploy:
    name: 🚀 Deploy to Hostinger
    runs-on: ubuntu-latest
    needs: test
    env:
      HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
      HOSTINGER_USERNAME: ${{ secrets.HOSTINGER_USERNAME }}
      HOSTINGER_SSH_PRIVATE_KEY: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
      HOSTINGER_DEPLOY_PATH: ${{ secrets.HOSTINGER_DEPLOY_PATH }}

    steps:
      - name: 🔍 Check required secrets
        run: |
          missing=""
          [ -z "$HOSTINGER_HOST" ] && missing="$missing HOSTINGER_HOST"
          [ -z "$HOSTINGER_USERNAME" ] && missing="$missing HOSTINGER_USERNAME"
          [ -z "$HOSTINGER_SSH_PRIVATE_KEY" ] && missing="$missing HOSTINGER_SSH_PRIVATE_KEY"
          [ -z "$HOSTINGER_DEPLOY_PATH" ] && missing="$missing HOSTINGER_DEPLOY_PATH"
          if [ -n "$missing" ]; then
            echo "⚠️ Skipping deploy — secrets not configured:$missing"
            exit 0
          fi
          echo "secrets_ok=true" >> $GITHUB_ENV

      - name: 📥 Checkout code
        if: env.secrets_ok == 'true'
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP
        if: env.secrets_ok == 'true'
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, bcmath, pdo, pdo_mysql, xml, curl, zip
          coverage: none

      - name: 📦 Cache Composer dependencies
        if: env.secrets_ok == 'true'
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: 🔧 Install Composer dependencies (production)
        if: env.secrets_ok == 'true'
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev

      - name: 🏗️ Build frontend assets
        if: env.secrets_ok == 'true'
        run: npm ci && npm run build

      - name: 🔐 Setup SSH key
        if: env.secrets_ok == 'true'
        run: |
          mkdir -p ~/.ssh
          echo "$HOSTINGER_SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$HOSTINGER_HOST" >> ~/.ssh/known_hosts

      - name: 📤 Deploy via Rsync
        if: env.secrets_ok == 'true'
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='storage/logs/*' \
            --exclude='storage/framework/cache/*' \
            --exclude='storage/framework/sessions/*' \
            --exclude='storage/framework/views/*' \
            -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" \
            ./ "$HOSTINGER_USERNAME@$HOSTINGER_HOST:$HOSTINGER_DEPLOY_PATH/"

      - name: ⚙️ Run post-deploy commands
        if: env.secrets_ok == 'true'
        run: |
          ssh -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=no \
            "$HOSTINGER_USERNAME@$HOSTINGER_HOST" \
            "cd $HOSTINGER_DEPLOY_PATH && \
            [ ! -f .env ] && cp .env.production .env || true && \
            php artisan key:generate --no-interaction && \
            php artisan migrate --force && \
            php artisan config:cache && \
            php artisan route:cache && \
            php artisan view:cache && \
            php artisan event:cache && \
            chmod -R 775 storage bootstrap/cache && \
            chown -R www-data:www-data storage bootstrap/cache 2>/dev/null || true && \
            echo '✅ Deploy selesai!'"
